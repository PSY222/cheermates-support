<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cheermates Support</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0D0D0F;
      color: #F2F1ED;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      text-align: center;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    p {
      font-size: 15px;
      line-height: 1.5;
      color: #9C9A93;
      margin-bottom: 24px;
    }
    a.email {
      display: inline-block;
      font-size: 16px;
      font-weight: 600;
      color: #ED8477;
      text-decoration: none;
      padding: 12px 24px;
      border: 1px solid #333335;
      border-radius: 999px;
    }
    a.email:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Cheermates Support</h1>
    <p>Need help, have feedback, or found a bug? Reach out and we'll get back to you.</p>
    <a class="email" href="mailto:cheermates@creaitique.com">cheermates@creaitique.com</a>
  </div>
</body>
</html>
